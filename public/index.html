<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Poet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1f2937">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto p-4 sm:p-6">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-indigo-400 tracking-wide">Pixel Poet 📜</h1>
                <p class="text-sm text-gray-400">Cinematic Captions & Poetry Manager</p>
            </div>
            <button id="installBtn" class="hidden bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                Install App
            </button>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">Save New Caption</h2>
            <div class="space-y-4">
                <textarea id="captionInput" rows="3" placeholder="Yahan apna cinematic caption ya shayari likho bhai..." 
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-gray-200 focus:outline-none focus:border-indigo-500"></textarea>
                
                <div class="flex flex-col sm:flex-row gap-4">
                    <select id="categoryInput" class="bg-gray-900 border border-gray-700 rounded-lg p-3 text-gray-200 focus:outline-none focus:border-indigo-500 flex-1">
                        <option value="Aesthetic ✨">Aesthetic ✨</option>
                        <option value="Retro/OG 📻">Retro/OG 📻</option>
                        <option value="Sad/Poetry 💔">Sad/Poetry 💔</option>
                        <option value="Thoughts 💭">Thoughts 💭</option>
                    </select>
                    <button onclick="saveCaption()" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold px-6 py-3 rounded-lg transition">
                        Save to SQL DB
                    </button>
                </div>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-4 text-indigo-300">Your Saved Vault</h2>
        <div id="captionsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Service Worker Register for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log("PWA Service Worker Active"));
        }
    </script>
</body>
</html>
